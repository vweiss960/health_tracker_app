{% extends "base.html" %}
{% block title %}Change Password - GritBoard{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="card">
        <h2>Change Your Password</h2>
        <p style="color: var(--text-muted); margin-bottom: 1.5rem;">You must set a new password before continuing.</p>
        <form method="POST">
            <div class="form-group">
                <input type="password" name="new_password" placeholder="New password" required autofocus>
            </div>
            <div class="form-group">
                <input type="password" name="confirm_password" placeholder="Confirm new password" required>
            </div>
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1rem;">
                Must be 8+ characters with uppercase, lowercase, and a number.
            </p>
            <button type="submit" class="btn btn-primary">Update Password</button>
        </form>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Register - GritBoard{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="card">
        <h2>Create Account</h2>
        <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Build the grind. Track the gains.</p>
        <form method="POST">
            <div class="form-group">
                <input type="text" name="display_name" placeholder="Display Name">
            </div>
            <div class="form-group">
                <input type="text" name="username" placeholder="Username" required autofocus>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-primary">Create Account</button>
        </form>
        <p style="margin-top: 1rem; font-size: 0.9rem; color: var(--text-muted);">
            Already have an account? <a href="{{ url_for('auth.login') }}" style="color: var(--primary);">Sign In</a>
        </p>
    </div>
</div>
{% endblock %}

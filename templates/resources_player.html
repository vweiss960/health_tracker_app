<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">GritBoard Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .title-bar { padding: 0.4rem 0.75rem; background: #1a1a1a; border-bottom: 2px solid #c0392b; display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
        .title-bar .title { flex: 1; font-size: 0.85rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .title-bar .label { font-size: 0.7rem; color: #999; }
        .player-wrap { flex: 1; position: relative; }
        .player-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div class="title-bar">
        <span class="label">GritBoard</span>
        <span class="title" id="titleText">Loading...</span>
    </div>
    <div class="player-wrap">
        <iframe id="ytFrame" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>
    <script>
    // Read playing state from localStorage
    function loadPlayer() {
        var data = localStorage.getItem('gb_music_playing');
        if (!data) { document.getElementById('titleText').textContent = 'Nothing playing'; return; }
        try {
            var p = JSON.parse(data);
            if (p.embedUrl) {
                document.getElementById('ytFrame').src = p.embedUrl;
                document.getElementById('titleText').textContent = p.title || 'Now Playing';
                document.title = (p.title || 'Player') + ' - GritBoard';
            }
        } catch(e) {}
    }

    // Listen for stop signal from other tabs
    window.addEventListener('storage', function(e) {
        if (e.key === 'gb_music_playing' && !e.newValue) {
            // Stopped from another tab
            document.getElementById('ytFrame').src = '';
            window.close();
        }
        if (e.key === 'gb_music_playing' && e.newValue) {
            // New song selected from another tab
            loadPlayer();
        }
    });

    loadPlayer();

    // Keep-alive: silent audio context prevents browser from suspending this window
    (function() {
        try {
            var ctx = new (window.AudioContext || window.webkitAudioContext)();
            var osc = ctx.createOscillator();
            var gain = ctx.createGain();
            gain.gain.value = 0;
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
        } catch(e) {}
        // Media Session for lock-screen controls
        if ('mediaSession' in navigator) {
            var data = localStorage.getItem('gb_music_playing');
            var title = 'GritBoard Music';
            try { title = JSON.parse(data).title || title; } catch(e) {}
            navigator.mediaSession.metadata = new MediaMetadata({ title: title, artist: 'GritBoard' });
            navigator.mediaSession.playbackState = 'playing';
        }
        // Re-acquire wake lock on visibility change
        var wl = null;
        function reqWake() {
            if ('wakeLock' in navigator) {
                navigator.wakeLock.request('screen').then(function(l) {
                    wl = l;
                    l.addEventListener('release', function() { wl = null; });
                }).catch(function() {});
            }
        }
        reqWake();
        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'visible') reqWake();
        });
    })();
    </script>
</body>
</html>
